name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Pinned service images — single source of truth for both integration jobs.
env:
  PEBBLE_IMAGE: ghcr.io/letsencrypt/pebble:2.10.1
  OPENBAO_IMAGE: openbao/openbao:2.6.0

jobs:
  # Single source of truth for the CoreDNS version matrix. Edit the list here;
  # every job below consumes it via fromJSON(needs.matrix.outputs.versions).
  matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set.outputs.versions }}
    steps:
      - id: set
        run: echo 'versions=["v1.14.6"]' >> "$GITHUB_OUTPUT"

  unit:
    name: unit (coredns ${{ matrix.coredns }})
    runs-on: ubuntu-latest
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        coredns: ${{ fromJSON(needs.matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-coredns
        with:
          coredns-version: ${{ matrix.coredns }}
      - name: Test
        run: go test ./plugin/acmednschallenge/...
        working-directory: ${{ runner.temp }}/coredns

  integration-disk:
    name: integration test disk (coredns ${{ matrix.coredns }})
    runs-on: ubuntu-latest
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        coredns: ${{ fromJSON(needs.matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-coredns
        with:
          coredns-version: ${{ matrix.coredns }}
      - name: Build CoreDNS
        run: go build -o "$RUNNER_TEMP/coredns-bin" .
        working-directory: ${{ runner.temp }}/coredns
      - name: Start Pebble (real DNS-01 validation against CoreDNS)
        run: |
          docker run -d --name pebble --network host \
            -e PEBBLE_VA_NOSLEEP=1 \
            "$PEBBLE_IMAGE" \
            -config test/config/pebble-config.json -strict -dnsserver 127.0.0.1:5354
          for i in $(seq 1 30); do
            curl -sk https://127.0.0.1:14000/dir >/dev/null && break
            sleep 1
          done
      - name: Issue and renew (disk storage)
        run: .github/ci/assert-renewed.sh "$RUNNER_TEMP/coredns-bin" .github/ci/corefiles/Corefile.disk /tmp/coredns-certs/certs/example.org.pem
      - name: Pebble logs on failure
        if: failure()
        run: docker logs pebble || true

  integration-vault:
    name: integration test vault (coredns ${{ matrix.coredns }})
    runs-on: ubuntu-latest
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        coredns: ${{ fromJSON(needs.matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-coredns
        with:
          coredns-version: ${{ matrix.coredns }}
      - name: Build CoreDNS
        run: go build -o "$RUNNER_TEMP/coredns-bin" .
        working-directory: ${{ runner.temp }}/coredns
      - name: Start Pebble (real DNS-01 validation against CoreDNS)
        run: |
          docker run -d --name pebble --network host \
            -e PEBBLE_VA_NOSLEEP=1 \
            "$PEBBLE_IMAGE" \
            -config test/config/pebble-config.json -strict -dnsserver 127.0.0.1:5354
          for i in $(seq 1 30); do
            curl -sk https://127.0.0.1:14000/dir >/dev/null && break
            sleep 1
          done
      - name: Start OpenBao (dev mode)
        run: |
          docker run -d --name openbao -p 8200:8200 \
            -e BAO_DEV_ROOT_TOKEN_ID=root "$OPENBAO_IMAGE" server -dev
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8200/v1/sys/health >/dev/null && break
            sleep 1
          done
      - name: Issue into Vault
        env:
          BAO_ADDR: http://127.0.0.1:8200
          BAO_TOKEN: root
        run: |
          .github/ci/assert-issued.sh "$RUNNER_TEMP/coredns-bin" .github/ci/corefiles/Corefile.vault \
            'curl -sf -H "X-Vault-Token: root" http://127.0.0.1:8200/v1/secret/data/coredns/acme/example.org'
      - name: Service logs on failure
        if: failure()
        run: |
          docker logs pebble || true
          docker logs openbao || true
